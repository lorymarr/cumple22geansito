<<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Cumpleaños Pechochito</title>
    <link href="https://fonts.googleapis.com/css2?family=Emilys+Candy&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0a0a0a; /* Fondo negro profundo */
            color: white;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- Pantalla de Inicio --- */
        #intro {
            text-align: center;
            z-index: 10;
            transition: opacity 1s ease;
        }

        #intro h1 {
            font-family: 'Emilys Candy', serif;
            font-size: 2.2rem;
            margin-bottom: 20px;
            color: #ffb7c5; /* Rosa suave aesthetic */
            text-shadow: 0 0 10px rgba(255, 183, 197, 0.5);
        }

        #cake-btn {
            font-size: 5rem;
            cursor: pointer;
            background: none;
            border: none;
            transition: transform 0.3s;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }

        #cake-btn:hover {
            transform: scale(1.2) rotate(5deg);
        }

        /* --- Contenedor de la Carta --- */
        #letter-container {
            display: none;
            position: relative;
            width: 85%;
            max-width: 550px;
            height: 75vh;
            /* Aquí va tu imagen de textura de papel */
            background-image: url('TU_URL_DE_TEXTURA_AQUI'); 
            background-color: #fdf5e6; /* Color crema de respaldo */
            background-size: cover;
            padding: 45px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            border-radius: 8px;
            color: #333; /* Texto oscuro para que se lea bien en el papel */
            z-index: 5;
            overflow-y: auto;
        }

        #letter-text {
            font-family: 'Emilys Candy', serif;
            font-size: 1.3rem;
            line-height: 1.7;
            white-space: pre-wrap;
        }

        /* --- Velas Fijas (Iluminación) --- */
        .candle {
            position: absolute;
            font-size: 2.5rem;
            filter: drop-shadow(0 0 20px rgba(255, 165, 0, 0.9));
            z-index: 6;
            user-select: none;
        }

        /* --- Iconos Flotantes (Keroppi, Chococat, etc) --- */
        .floating-icon {
            position: absolute;
            width: 100px;
            height: auto;
            z-index: 2;
            opacity: 0.7;
            animation: floatAnim 8s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes floatAnim {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(15px, -30px) rotate(10deg); }
            66% { transform: translate(-15px, -15px) rotate(-10deg); }
        }

        /* --- El Beso Final --- */
        #kiss {
            display: none;
            position: sticky;
            bottom: 10px;
            left: 80%;
            width: 80px;
            opacity: 0;
            transition: opacity 2s ease;
            margin-top: 20px;
        }

        /* Resplandor ambiental de las velas */
        .glow-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,140,0,0.08) 0%, rgba(0,0,0,0) 80%);
            pointer-events: none;
            z-index: 4;
        }
    </style>
</head>
<body>

    <div class="glow-overlay"></div>

    <div id="intro">
        <h1>Happy birthday pechochito! tqm,<br>toca el pastel para que veas el resto!</h1>
        <button id="cake-btn">🎂</button>
    </div>

    <div id="letter-container">
        <div id="letter-text"></div>
        <img id="kiss" src="kissicon.png" alt="beso">
    </div>

    <div class="candle" style="top: 5%; left: 5%;">🕯️</div>
    <div class="candle" style="top: 5%; right: 5%;">🕯️</div>
    <div class="candle" style="bottom: 5%; left: 5%;">🕯️</div>
    <div class="candle" style="bottom: 5%; right: 5%;">🕯️</div>

    <img src="keroppychococat.png" class="floating-icon" style="top: 15%; left: 10%; animation-delay: 0s;">
    <img src="Keroppiceleb.png" class="floating-icon" style="top: 55%; right: 8%; animation-delay: 2s;">
    <img src="keroppicake.gif" class="floating-icon" style="bottom: 15%; left: 20%; animation-delay: 4s;">

    <script>
        const intro = document.getElementById('intro');
        const letterContainer = document.getElementById('letter-container');
        const letterText = document.getElementById('letter-text');
        const cakeBtn = document.getElementById('cake-btn');
        const kiss = document.getElementById('kiss');

        // --- AQUÍ PEGARÁS TU CARTA CUANDO LA TENGAS LISTA ---
        const textoCarta = `[Holi, solo quiero decirte lo mucho que te quiero en esta cartita y obviamente desearte un feliz cumpleaños mi viejito. Sabes que te quiero mucho, eso creo q lo sabes de más porque no paro de decírtelo, pero como quisiera estar ahí y felicitar ese año más de vida que cumples y aparte llenarte de besos. Espero que llegues a los 90 así viejito y que yo esté a tu lado para ver ese momento y que podamos recordar todo este tiempo separados como algo pasado que nos ayudó a ser lo que seremos en un futuro, y en mi mente sólo hay un futuro bien bonito contigo mi amorchito, iluminas mi vida así como las velitas q puse iluminan esta página web jiji. Eres ya mi pechocho viejito <3. Te kiero mucho]`;

        cakeBtn.addEventListener('click', () => {
            intro.style.opacity = '0';
            setTimeout(() => {
                intro.style.display = 'none';
                letterContainer.style.display = 'block';
                typeWriter();
            }, 1000);
        });

        let i = 0;
        function typeWriter() {
            if (i < textoCarta.length) {
                letterText.innerHTML += textoCarta.charAt(i);
                i++;
                // Velocidad de la animación de escritura
                setTimeout(typeWriter, 60); 
                
                // Hace que baje solo si el texto es muy largo
                letterContainer.scrollTop = letterContainer.scrollHeight;
            } else {
                // Aparece el beso al final
                kiss.style.display = 'block';
                setTimeout(() => { kiss.style.opacity = '1'; }, 300);
            }
        }
    </script>
</body>
</html>
